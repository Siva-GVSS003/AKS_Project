apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: backend
  labels:
    app: order-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
      - name: order-container
        image: tejaacr.azurecr.io/order-service:latest
        ports:
        - containerPort: 8080
