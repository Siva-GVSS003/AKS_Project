name: Deploy PreProd Environments

on:
  workflow_run:
    workflows: ["CI Build Pipeline"]
    types:
      - completed

env:
  ACR_NAME: tejaacr
  AKS_CLUSTER_NAME: teja-aks-cluster
  AKS_RESOURCE_GROUP: teja-devops-rg

jobs:

########################################################
# DEV DEPLOYMENT
########################################################

  deploy-dev:
    if: github.event.workflow_run.head_branch == 'develop'
    runs-on: ubuntu-latest
    environment: dev

    steps:

    - name: Checkout
      uses: actions/checkout@v3

    - name: Login Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Connect to AKS
      run: |
        az aks get-credentials \
        --resource-group $AKS_RESOURCE_GROUP \
        --name $AKS_CLUSTER_NAME \
        --overwrite-existing

    - name: Deploy to DEV
      run: |
        kubectl set image deployment/user-service \
        user-container=$ACR_NAME.azurecr.io/user-service:latest -n dev

########################################################
# QA DEPLOYMENT
########################################################

  deploy-qa:
    if: github.event.workflow_run.head_branch == 'qa'
    runs-on: ubuntu-latest
    environment: qa

    steps:

    - name: Checkout
      uses: actions/checkout@v3

    - name: Login Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Connect to AKS
      run: |
        az aks get-credentials \
        --resource-group $AKS_RESOURCE_GROUP \
        --name $AKS_CLUSTER_NAME \
        --overwrite-existing

    - name: Deploy to QA
      run: |
        kubectl set image deployment/user-service \
        user-container=$ACR_NAME.azurecr.io/user-service:latest -n qa

########################################################
# STAGING DEPLOYMENT
########################################################

  deploy-staging:
    if: github.event.workflow_run.head_branch == 'staging'
    runs-on: ubuntu-latest
    environment: staging

    steps:

    - name: Checkout
      uses: actions/checkout@v3

    - name: Login Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Connect to AKS
      run: |
        az aks get-credentials \
        --resource-group $AKS_RESOURCE_GROUP \
        --name $AKS_CLUSTER_NAME \
        --overwrite-existing

    - name: Deploy to STAGING
      run: |
        kubectl set image deployment/user-service \
        user-container=$ACR_NAME.azurecr.io/user-service:latest -n staging
