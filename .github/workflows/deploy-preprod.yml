name: Deploy PreProd Environments

on:
  workflow_run:
    workflows: ["CI Build Pipeline"]
    types:
      - completed

env:
  ACR_NAME: tejaacr
  AKS_CLUSTER_NAME: teja-aks-cluster
  AKS_RESOURCE_GROUP: teja-devops-rg

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env: [dev, qa, staging]

    steps:
    - uses: actions/checkout@v3

    - name: Login Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Connect AKS
      run: |
        az aks get-credentials \
          --resource-group $AKS_RESOURCE_GROUP \
          --name $AKS_CLUSTER_NAME \
          --overwrite-existing

    - name: Deploy to ${{ matrix.env }}
      run: |
        # Use the SHA from the CI workflow that triggered this deploy
        SHA=${{ github.event.workflow_run.head_sha }}
        NAMESPACE=${{ matrix.env }}

        # Update microservices
        kubectl apply -R -f microservices -n $NAMESPACE
        kubectl apply -f ./deployment.yaml -n $NAMESPACE  # springboot-app deployment
        kubectl apply -f ./service.yaml -n $NAMESPACE     # springboot-app service
        kubectl apply -f ./ingress.yaml -n $NAMESPACE     # ingress for routing
        kubectl set image deployment/user-service user-container=$ACR_NAME.azurecr.io/user-service:$SHA -n $NAMESPACE
        kubectl set image deployment/order-service order-container=$ACR_NAME.azurecr.io/order-service:$SHA -n $NAMESPACE
        kubectl set image deployment/payment-service payment-container=$ACR_NAME.azurecr.io/payment-service:$SHA -n $NAMESPACE

        # Update monolith
        kubectl set image deployment/springboot-app springboot-container=$ACR_NAME.azurecr.io/aksdemo:$SHA -n $NAMESPACE

        # Wait for rollouts
        kubectl rollout status deployment/user-service -n $NAMESPACE
        kubectl rollout status deployment/order-service -n $NAMESPACE
        kubectl rollout status deployment/payment-service -n $NAMESPACE
        kubectl rollout status deployment/springboot-app -n $NAMESPACE
