name: Deploy PreProd Environments

on:
  workflow_run:
    workflows: ["CI Build Pipeline"]
    types:
      - completed

env:
  ACR_NAME: tejaacr
  AKS_CLUSTER_NAME: teja-aks-cluster
  AKS_RESOURCE_GROUP: teja-devops-rg

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env: [dev, qa, staging]

    steps:
    - uses: actions/checkout@v3

    - name: Login Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Connect AKS
      run: |
        az aks get-credentials \
          --resource-group $AKS_RESOURCE_GROUP \
          --name $AKS_CLUSTER_NAME \
          --overwrite-existing

    - name: Deploy to ${{ matrix.env }}
      run: |
        SHA=${{ github.event.workflow_run.head_sha }}
        NAMESPACE=${{ matrix.env }}
    
        echo "Deploying to namespace: $NAMESPACE"
    
        ###################################
        # Deploy Microservices
        ###################################
        kubectl apply -f microservices/user-service/deployment.yaml -n $NAMESPACE
        kubectl apply -f microservices/user-service/service.yaml -n $NAMESPACE
    
        kubectl apply -f microservices/order-service/deployment.yaml -n $NAMESPACE
        kubectl apply -f microservices/order-service/service.yaml -n $NAMESPACE
    
        kubectl apply -f microservices/payment-service/deployment.yaml -n $NAMESPACE
        kubectl apply -f microservices/payment-service/service.yaml -n $NAMESPACE
    
        ###################################
        # Deploy Springboot Monolith
        ###################################
        kubectl apply -f deployment.yaml -n $NAMESPACE
        kubectl apply -f service.yaml -n $NAMESPACE
    
        ###################################
        # Deploy Ingress per Environment
        ###################################
        kubectl apply -f ingress/ingress-$NAMESPACE.yaml -n $NAMESPACE
    
        ###################################
        # Update Images
        ###################################
        kubectl set image deployment/user-service user-container=$ACR_NAME.azurecr.io/user-service:$SHA -n $NAMESPACE
        kubectl set image deployment/order-service order-container=$ACR_NAME.azurecr.io/order-service:$SHA -n $NAMESPACE
        kubectl set image deployment/payment-service payment-container=$ACR_NAME.azurecr.io/payment-service:$SHA -n $NAMESPACE
    
        kubectl set image deployment/springboot-app springboot-container=$ACR_NAME.azurecr.io/aksdemo:$SHA -n $NAMESPACE
    
        ###################################
        # Wait for Rollouts
        ###################################
        kubectl rollout status deployment/user-service -n $NAMESPACE
        kubectl rollout status deployment/order-service -n $NAMESPACE
        kubectl rollout status deployment/payment-service -n $NAMESPACE
        kubectl rollout status deployment/springboot-app -n $NAMESPACE
