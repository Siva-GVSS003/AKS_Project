name: Build and Deploy Applications to AKS

on:
  push:
    branches:
      - main

env:
  ACR_NAME: tejaacr
  AKS_CLUSTER_NAME: teja-aks-cluster
  AKS_RESOURCE_GROUP: teja-devops-rg

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    ###############################
    # 1️⃣ Checkout Code
    ###############################
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: List repo files (debug)
      run: ls -R

    ###############################
    # 2️⃣ Setup Java 17
    ###############################
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        distribution: temurin
        java-version: 17

    ###############################
    # 3️⃣ Login Azure
    ###############################
    - name: Login to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    ###############################
    # 4️⃣ Login to ACR
    ###############################
    - name: Login to Azure Container Registry
      run: az acr login --name $ACR_NAME

    ###############################
    # 5️⃣ Build & Push Microservices
    ###############################
    - name: Build & Push User Service
      working-directory: microservices/user-service
      run: |
        mvn clean package -DskipTests
        docker build -t $ACR_NAME.azurecr.io/user-service:${{ github.sha }} .
        docker push $ACR_NAME.azurecr.io/user-service:${{ github.sha }}

    - name: Build & Push Order Service
      working-directory: microservices/order-service
      run: |
        mvn clean package -DskipTests
        docker build -t $ACR_NAME.azurecr.io/order-service:${{ github.sha }} .
        docker push $ACR_NAME.azurecr.io/order-service:${{ github.sha }}

    - name: Build & Push Payment Service
      working-directory: microservices/payment-service
      run: |
        mvn clean package -DskipTests
        docker build -t $ACR_NAME.azurecr.io/payment-service:${{ github.sha }} .
        docker push $ACR_NAME.azurecr.io/payment-service:${{ github.sha }}

    ###############################
    # 6️⃣ Build & Push Monolith SpringBoot App
    ###############################
    - name: Build & Push SpringBoot Monolith
      working-directory: .
      run: |
        mvn clean package -DskipTests
        docker build -t $ACR_NAME.azurecr.io/aksdemo:${{ github.sha }} .
        docker push $ACR_NAME.azurecr.io/aksdemo:${{ github.sha }}

    ###############################
    # 7️⃣ Connect to AKS
    ###############################
    - name: Set AKS Context
      run: |
        az aks get-credentials \
          --resource-group $AKS_RESOURCE_GROUP \
          --name $AKS_CLUSTER_NAME \
          --overwrite-existing

    ###############################
    # 8️⃣ Deploy Applications
    ###############################
    - name: Deploy & Update Microservices + Monolith
      run: |
        # 1️⃣ Apply deployments & services (create if not exist)
        kubectl apply -f microservices/user-service/
        kubectl apply -f microservices/order-service/
        kubectl apply -f microservices/payment-service/
        kubectl apply -f ./deployment.yaml -n backend    # springboot-app deployment
        kubectl apply -f ./service.yaml        # springboot-app service
        kubectl apply -f ./ingress.yaml        # ingress for routing

        # 2️⃣ Update container images
        kubectl set image deployment/springboot-app springboot-container=$ACR_NAME.azurecr.io/aksdemo:${{ github.sha }} -n backend
        kubectl set image deployment/user-service user-container=$ACR_NAME.azurecr.io/user-service:${{ github.sha }}
        kubectl set image deployment/order-service order-container=$ACR_NAME.azurecr.io/order-service:${{ github.sha }}
        kubectl set image deployment/payment-service payment-container=$ACR_NAME.azurecr.io/payment-service:${{ github.sha }}

        # 3️⃣ Wait for rollouts
        kubectl rollout status deployment/springboot-app -n backend
        kubectl rollout status deployment/user-service
        kubectl rollout status deployment/order-service
        kubectl rollout status deployment/payment-service
