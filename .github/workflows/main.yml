name: Debug Repo Structure

on:
  push:
    branches:
      - main

jobs:
  debug:
    runs-on: ubuntu-latest

    steps:
      ###############################
      # 1️⃣ Checkout Code
      ###############################
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # full repo history

      ###############################
      # 2️⃣ Print working directory
      ###############################
      - name: Print current working directory
        run: pwd

      ###############################
      # 3️⃣ List all files recursively
      ###############################
      - name: List all files recursively
        run: ls -R

      ###############################
      # 4️⃣ Test cd into microservices/user-service
      ###############################
      - name: Test cd into User Service
        run: |
          echo "Trying to cd into microservices/user-service"
          cd microservices/user-service || echo "Folder not found!"
          pwd
          ls

      ###############################
      # 5️⃣ Test cd into Order Service
      ###############################
      - name: Test cd into Order Service
        run: |
          echo "Trying to cd into microservices/order-service"
          cd microservices/order-service || echo "Folder not found!"
          pwd
          ls

      ###############################
      # 6️⃣ Test cd into Payment Service
      ###############################
      - name: Test cd into Payment Service
        run: |
          echo "Trying to cd into microservices/payment-service"
          cd microservices/payment-service || echo "Folder not found!"
          pwd
          ls
